<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Francisco Yuster</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="blue-dot">■</span> Francisco Yuster
        </div>
        <nav>
            <a href="index.html">SOBRE MÍ</a>
            <a href="curriculum.html">CURRÍCULUM</a>
            <a href="projects.html">PROYECTOS</a>
            <a href="contact.html">CONTACTO</a>
        </nav>
    </header>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <h2><span class="blue-dot">■</span> Platiquemos</h2>
        <form>
            <div class="form-group">
                <input type="text" placeholder="Nombre *">
                <input type="text" placeholder="Apellido *">
            </div>
            <input type="email" placeholder="Email *">
            <input type="text" placeholder="Asunto">
            <textarea placeholder="Mensaje"></textarea>
            <button class="btn-primary">ENVIAR</button>
        </form>
    </section>

    <footer>
        <p>© Creado por Francisco Yuster</p>
        <div class="contact-info">
            <p>yusterfrancisco@gmail.com</p>
        </div>
    </footer>
</body>

<script>
    // Función para agregar la clase de desvanecimiento al cargar la página
    document.addEventListener("DOMContentLoaded", () => {
        document.body.classList.add("fade-in");
    });

    // Función para manejar el desvanecimiento al hacer clic en un enlace
    document.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", (event) => {
            // Evitar la redirección inmediata
            event.preventDefault();
            const href = link.getAttribute("href");

            // Añadir clase de desvanecimiento de salida
            document.body.classList.add("fade-out");

            // Esperar a que termine la animación antes de redirigir
            setTimeout(() => {
                window.location.href = href;
            }, 500); // Tiempo igual a la duración de fade-out
        });
    });
</script>


</html>
