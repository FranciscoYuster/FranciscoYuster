    <script>

let currentLanguage = "es"; // Idioma predeterminado

// Cambiar idioma y recargar todas las secciones
function changeLanguage(event) {
  currentLanguage = event.target.value;
  loadTranslations();
  loadSections();
}

async function loadTranslations() {
  try {
    // Cargar el archivo JSON con las traducciones
    const response = await fetch('translations.json');
    const translations = await response.json();

    // Obtener las traducciones para el idioma actual
    const langData = translations[currentLanguage];

    // Actualizar los textos del header
    document.querySelector('#nav_title').textContent = langData.header.about;
    document.querySelector('a[href="#curriculum"]').textContent = langData.header.curriculum;
    document.querySelector('a[href="#projects"]').textContent = langData.header.projects;

    // Actualizar los textos del footer
    document.querySelector('footer p').textContent = langData.footer.copyright;
    document.querySelector('.contact-info p').textContent = langData.footer.social;

  } catch (error) {
    console.error('Error cargando las traducciones:', error);
  }
}

// Cargar todas las secciones simultáneamente
async function loadSections() {
  const main = document.getElementById('content');
  try {
    // Archivos de secciones a cargar
    const sections = ['about', 'curriculum', 'projects'];
    // Fetch simultáneo para todas las secciones
    const responses = await Promise.all(
      sections.map(section => fetch(`sections/${section}_${currentLanguage}.html`))
    );

    // Convertir las respuestas a texto
    const htmlContents = await Promise.all(responses.map(response => {
      if (!response.ok) throw new Error(`Error al cargar ${response.url}`);
      return response.text();
    }));

    // Concatenar contenido y actualizar el DOM
    main.innerHTML = htmlContents.join('\n');
  } catch (error) {
    console.error(error);
    main.innerHTML = `<p>Error al cargar las secciones.</p>`;
  }
}

// Cargar las secciones iniciales al cargar la página
document.addEventListener('DOMContentLoaded', () => {
  loadTranslations(); // Traducir header y footer al cargar
  loadSections(); // Cargar secciones en el idioma predeterminado
});



// Mostrar/Ocultar botón "Ir al Top" según el scroll
const backToTopButton = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
    if (window.scrollY > 200) {
        backToTopButton.classList.add('show');
    } else {
        backToTopButton.classList.remove('show');
    }
});

// Scroll suave al hacer clic en el botón "Ir al Top"
backToTopButton.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});

function scrollToSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (section) {
        section.scrollIntoView({ behavior: 'smooth' });
    } else {
        console.error(`La sección con ID ${sectionId} no existe.`);
    }
}

document.querySelectorAll('#navbar a').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href').substring(1);
        scrollToSection(targetId);

        // Marcar enlace activo
        document.querySelectorAll('#navbar a').forEach(el => el.classList.remove('active'));
        link.classList.add('active');
    });
});


const themeToggle = document.getElementById('theme-toggle');

themeToggle.addEventListener('change', () => {
    document.body.classList.toggle('dark-mode');
    const isDarkMode = document.body.classList.contains('dark-mode');

    // Guardar preferencia en localStorage
    localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
});

// Aplicar el tema guardado al cargar la página
document.body.classList.add('dark-mode');
themeToggle.checked = true;

  


    </script>
</body>
