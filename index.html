<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Francisco Yuster</title>
   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
       <!-- Añadir favicon -->
       <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    
    </head>
<body class="fade-in">
    <header>
        <div class="logo">
            <span class="blue-dot">■</span> Francisco Yuster
        </div>
        <!-- Añadir el botón del menú hamburguesa -->
        <button class="hamburger-menu" id="hamburger-menu">
            <i class="fas fa-bars"></i>
        </button>
        <nav id="navbar" class="navbar">
            
            <a href="#" data-section="about">Sobre mí</a>
            <a href="#" data-section="curriculum">Curriculum</a>
            <a href="#" data-section="projects">Proyectos</a>
        </nav>
    
        <!-- Menú desplegable para la selección de idioma -->
       
        <div class="language-theme-container">
            <!-- Selector de idioma -->
            <div class="language-selector">
                <select id="language-select">
                    <option value="es">Spanish</option>
                    <option value="en">English</option>
                </select>
            </div>
        
            <!-- Botón toggle para el modo oscuro -->
            <div class="toggle-container">
                <input type="checkbox" id="theme-toggle" />
                <label for="theme-toggle" class="toggle"></label>
            </div>
        </div>
        
        
    </header>
    
    <main id="content">
        <!-- Aquí se cargarán las secciones dinámicamente -->
    </main>
    
    <footer>
        <p>© Creado por Francisco Yuster</p>
        <div class="contact-info">
            <p>¡Conéctate conmigo en mis redes sociales!</p>
            <div class="social-icons">
                <a href="https://github.com/FranciscoYuster" target="_blank">
                    <i class="fab fa-github"></i> Github
                </a>
                <a href="https://www.linkedin.com/in/francisco-yuster-aa0b06258/" target="_blank">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="mailto:yusterfrancisco@gmail.com">
                    <i class="fas fa-envelope"></i> yusterfrancisco@gmail.com
                </a>
            </div>
        </div>
        <button id="back-to-top" class="btn-secondary">↑</button>

    </footer>
    
    <script src="app.js"></script>
</body>
</html>
